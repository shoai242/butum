<!DOCTYPE html>
<html>
<head>
    <title>Special Message</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1, h2, h3, h4, h5 {
            color: #d62828;
            margin: 10px;
        }

        h1 {
            font-size: 40px;
        }

        h2, h3, h4, h5 {
            font-size: 28px;
        }
    </style>
</head>

<body>

    <h1 id="message"></h1>
    <h2 id="reply1"></h2>
    <h3 id="reply2"></h3>
    <h4 id="reply3"></h4>
    <h5 id="reply4"></h5>

    <script>
        const text1 = "Hoise butum r raag korte hobe na 🌚❤️";
        const text2 = "2008 deua nid te";
        const text3 = "raag korle tmk khub bhalo lage bises kore raag kore bola ktha ta";
        const text4 = "thappor dibo ekta 🌚";
        const text5 = "ki j sundor lge tmk 💖";

        function typeText(id, text, speed, callback) {
            let i = 0;

            function typing() {
                if (i < text.length) {
                    document.getElementById(id).innerHTML += text.charAt(i);
                    i++;
                    setTimeout(typing, speed);
                } else if (callback) {
                    setTimeout(callback, 300);
                }
            }

            typing();
        }

        typeText("message", text1, 100, function () {
            typeText("reply1", text2, 100, function () {
                typeText("reply2", text3, 100, function () {
                    typeText("reply3", text4, 100, function () {
                        typeText("reply4", text5, 100);
                    });
                });
            });
        });
    </script>

</body>
</html>
